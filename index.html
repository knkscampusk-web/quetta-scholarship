<script>
firebase.initializeApp({apiKey:"AIzaSyBQ3V-4EYiIKShPmfuNwhPMz-WiiTzi6CM",authDomain:"grades-of-test.firebaseapp.com",projectId:"grades-of-test",storageBucket:"grades-of-test.firebasestorage.app",messagingSenderId:"607351091085",appId:"1:607351091085:web:19b3b42ee58bb0045f57c4"});
const auth=firebase.auth();const db=firebase.firestore();
async function doLogin(){
  const pw=document.getElementById('li-pw').value;
  document.getElementById('li-err').textContent='';
  try{await auth.signInWithEmailAndPassword('campusk@dshw.co.kr',pw);}

}
auth.onAuthStateChanged(async user=>{
  if(user){document.getElementById('login-screen').style.display='none';document.getElementById('app-screen').style.display='flex';S.userEmail=user.email;await loadAll();render();}
  else{document.getElementById('login-screen').style.display='flex';document.getElementById('app-screen').style.display='none';}

function doLogout(){auth.signOut();}
const ENG_D={1:0,2:.5,3:2,4:4,5:6,6:8,7:10,8:12,9:14};
const COL={반:2,번호:3,이름:4,계열:5,국어표준:12,국어백분:13,수학표준:26,수학백분:27,영어등급:36,탐1표준:55,탐1백분:56,탐2표준:66,탐2백분:67};
const BAN_CODE={'71':'A','72':'X','73':'I','74':'O','75':'M','76':'K','77':'N','78':'D','79':'S'};
const BAN_LIST=['71','72','73','74','75','76','77','78','79'];
let SCONF={
  auto:{
    d1:{lbl:'다이닝 장학',혜택:'식비 100%',bc:'bd',기준:'QUETTA 전체 환산표점 1위'},

    qt:{lbl:'퀀텀 장학',혜택:'독서실비 100%',bc:'bm',기준:'QUETTA 전체 환산표점 3위'},
    math:{lbl:'수학반 1등',혜택:'독서실비 100%',bc:'bm',기준:'각 반별 환산표점 1위'},
    mi:{lbl:'수학백분위 최고 향상',혜택:'독서실비 100%',bc:'bm',기준:'수학 백분위 최대 향상자'},
    ti:{lbl:'백분위총합 최고 향상',혜택:'독서실비 100%',bc:'bm',기준:'N+AB+BE+BP 최대 향상자'},
  },

    dasung_in:{lbl:'대성학원 전체 1등 (인문)',혜택:'교습비 100%',bc:'bq',multi:false,cols:['반','학번','이름','환산점수','비고']},
    dasung_nat:{lbl:'대성학원 전체 1등 (자연)',혜택:'교습비 100%',bc:'bq',multi:false,cols:['반','학번','이름','환산점수','비고']},
    quetta_in:{lbl:'QUETTA 장학 (인문)',혜택:'교습비 100%',bc:'bq',multi:false,cols:['반','학번','이름','환산점수','비고']},
    quetta_nat:{lbl:'QUETTA 장학 (자연)',혜택:'교습비 100%',bc:'bq',multi:false,cols:['반','학번','이름','환산점수','비고']},
    billboard_in:{lbl:'서울 빌보드 (인문)',혜택:'매점상품권 5만원권',bc:'bb',multi:true,cols:['반','학번','이름','환산점수','비고']},
    billboard_nat:{lbl:'서울 빌보드 (자연)',혜택:'매점상품권 5만원권',bc:'bb',multi:true,cols:['반','학번','이름','환산점수','비고']},
    honor_in:{lbl:'성적우수자 (인문)',혜택:'매점상품권 5만원권',bc:'bb',multi:true,cols:['반','학번','이름','환산점수','비고']},
    honor_nat:{lbl:'성적우수자 (자연)',혜택:'매점상품권 5만원권',bc:'bb',multi:true,cols:['반','학번','이름','환산점수','비고']},
    improve_gift:{lbl:'성적 향상',혜택:'매점상품권 5만원권',bc:'bg',multi:true,cols:['반','학번','이름','비고']},
  }
};
const ACTIVE_MANUAL=['dasung_in','dasung_nat','honor_in','honor_nat'];
const _now=new Date();
let S={
  tab:'results',
  curYear:String(_now.getFullYear()),
  curMonth:String(_now.getMonth()+1),
  시험종류:'더프',
  monthConfirmed:false,
  curStudents:null,prevStudents:null,
  curFile:null,prevFile:null,exFile:null,
  exMap:{},results:null,manual:{},
  excluded:new Set(),remarks:{},
  accumulated:{},allStudentsData:{},
  finalViewMonth:null,allViewMonth:null,
  dbg:'',err:null,syncMsg:'',userEmail:'',
};
let _ws=[];let _mSel=new Set();let _mSort='desc';
function initManual(){Object.keys(SCONF.manual).forEach(id=>{if(!S.manual[id]||!S.manual[id].length)S.manual[id]=[erow(id)];});}
function erow(id){const r={};(SCONF.manual[id]?.cols||[]).forEach(c=>r[c]='');return r;}
function mkey(){return`${S.curYear}-${S.curMonth.padStart(2,'0')}`;}
function mlbl(mk){const m=mk.match(/^(\d{4})-(\d{2})$/);if(!m)return mk;return`${m[1]}년 ${parseInt(m[2])}월`;}
function fullLbl(mk){const d=S.accumulated[mk];const base=d?.label||mlbl(mk);const jt=d?.시험종류||'';return jt?`${base} (${jt})`:base;}
async function loadAll(){
  try{
    const cfgDoc=await db.collection('quetta_settings').doc('sconf').get();
    if(cfgDoc.exists){
      const sv=cfgDoc.data();
      if(sv.auto)Object.keys(sv.auto).forEach(k=>{if(SCONF.auto[k])Object.assign(SCONF.auto[k],sv.auto[k]);});
      if(sv.manual)Object.keys(sv.manual).forEach(k=>{if(SCONF.manual[k])Object.assign(SCONF.manual[k],sv.manual[k]);});
    }
    const snap=await db.collection('quetta_data').get();
    S.accumulated={};S.allStudentsData={};
    snap.forEach(doc=>{const d=doc.data();S.accumulated[doc.id]=d;if(d.allStudents)S.allStudentsData[doc.id]=d.allStudents;});
    const mk=mkey();
    if(S.accumulated[mk]){
      const d=S.accumulated[mk];
      if(d.manual)Object.keys(SCONF.manual).forEach(id=>{if(d.manual[id])S.manual[id]=d.manual[id];});
      if(d.excluded)S.excluded=new Set(d.excluded);
      if(d.remarks)S.remarks=d.remarks;
      if(d.시험종류)S.시험종류=d.시험종류;
    }
    initManual();setSyncMsg('✓ 로드 완료');
  }catch(e){setSyncMsg('⚠ 로드 실패: '+e.message);}
}
async function saveAutoResults(){
  const mk=mkey();
  if(!S.curStudents){alert('성적 파일을 먼저 업로드하세요.');return;}
  setSyncMsg('저장 중...');
  try{
    const data={label:`${S.curYear}년 ${S.curMonth}월`,시험종류:S.시험종류,classStats:calcClassStats(),overallAvg:overallAvg(),allStudents:S.curStudents,savedAt:new Date().toISOString()};
    await db.collection('quetta_data').doc(mk).set(data,{merge:true});
    S.accumulated[mk]={...S.accumulated[mk],...data};S.allStudentsData[mk]=S.curStudents;
    setSyncMsg('✓ 자동산출 저장 완료');render();
  }catch(e){setSyncMsg('⚠ 저장 실패: '+e.message);}
}
async function saveToFirestore(){
  const mk=mkey();const ws=getAllWinners();setSyncMsg('저장 중...');
  try{
    const data={
      label:`${S.curYear}년 ${S.curMonth}월`,시험종류:S.시험종류,
      winners:ws.map(w=>({...w,excluded:S.excluded.has(wkey(w)),기존장학:S.exMap[String(w.번호)]||w.기존장학||'',비고:S.remarks[wkey(w)]||''})),
      classStats:calcClassStats(),overallAvg:overallAvg(),
      manual:S.manual,excluded:[...S.excluded],remarks:S.remarks,
      allStudents:S.curStudents||S.allStudentsData[mk]||null,
      savedAt:new Date().toISOString(),
    };
    await db.collection('quetta_data').doc(mk).set(data);
    S.accumulated[mk]=data;if(data.allStudents)S.allStudentsData[mk]=data.allStudents;
    setSyncMsg('✓ 저장 완료 ('+new Date().toLocaleTimeString('ko-KR')+')');
  }catch(e){setSyncMsg('⚠ 저장 실패: '+e.message);}
}
async function autoSaveManual(){
  clearTimeout(window._ast);

function parseScores(buf){
  const wb=XLSX.read(buf,{type:'array'});
  const wsn=wb.SheetNames.find(n=>n==='성적')||wb.SheetNames[0];
  const raw=XLSX.utils.sheet_to_json(wb.Sheets[wsn],{header:1,defval:''});
  const toN=v=>{const x=parseFloat(String(v||'').replace(/,/g,''));return isNaN(x)?0:x;};
  let ds=0;
  for(let i=0;i<Math.min(15,raw.length);i++){
    const nm=String(raw[i][COL.이름]||'').trim();const bn=parseFloat(String(raw[i][COL.번호]||'').replace(/,/g,''));
    if(nm&&nm!=='이름'&&!isNaN(bn)&&bn>0){ds=i;break;}
  }
  const arr=[];
  for(let i=ds;i<raw.length;i++){
    const r=raw[i];const 이름=String(r[COL.이름]||'').trim();if(!이름)continue;
    const 번호=toN(r[COL.번호]);if(!번호)continue;
    const eng=Math.round(toN(r[COL.영어등급]))||9;const d2=ENG_D[eng]??14;
    const 국어표준=toN(r[COL.국어표준]),수학표준=toN(r[COL.수학표준]);
    const 탐1표준=toN(r[COL.탐1표준]),탐2표준=toN(r[COL.탐2표준]);
    arr.push({
      반:Number(r[COL.반])||0,번호,이름,계열:String(r[COL.계열]||'').trim(),
      국어표준,국어백분:toN(r[COL.국어백분]),수학표준,수학백분:toN(r[COL.수학백분]),
      영어등급:eng,탐1표준,탐1백분:toN(r[COL.탐1백분]),탐2표준,탐2백분:toN(r[COL.탐2백분]),
      환산:국어표준+수학표준+탐1표준+탐2표준-d2,
      백분위합:toN(r[COL.국어백분])+toN(r[COL.수학백분])+toN(r[COL.탐1백분])+toN(r[COL.탐2백분]),
    });
  }
  S.dbg=`시트:"${wsn}" ${raw.length}행 → ${arr.length}명`;
  return arr;
}
function parseExisting(buf){
  const wb=XLSX.read(buf,{type:'array'});
  const raw=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
  const map={};
  for(let i=1;i<raw.length;i++){const hb=String(raw[i][9]||'').trim();const jl=String(raw[i][3]||'').trim();if(hb&&jl)map[hb]=map[hb]?map[hb]+', '+jl:jl;}
  return map;
}
function calcResults(){
  const cur=S.curStudents,prev=S.prevStudents;const res={};
  const bh=[...cur].sort((a,b)=>b.환산-a.환산||b.수학표준-a.수학표준||b.국어표준-a.국어표준);
  res.d1=bh[0]||null;res.d2=bh[1]||null;res.qt=bh[2]||null;res.math={};
  [...new Set(cur.map(s=>s.반))].filter(b=>b>0).sort((a,b)=>a-b).forEach(ban=>{
    const g=cur.filter(s=>s.반===ban).sort((a,b)=>b.환산-a.환산||b.수학표준-a.수학표준||b.국어표준-a.국어표준);
    if(g.length)res.math[ban]=g[0];
  });
  res.mi=null;res.ti=null;
  if(prev?.length){
    const pm={};prev.forEach(s=>pm[s.번호]=s);
    const bm=cur.filter(s=>pm[s.번호]!==undefined);
    const mi=bm.filter(s=>pm[s.번호].수학백분>0).map(s=>({...s,향상:s.수학백분-pm[s.번호].수학백분,이전수학:pm[s.번호].수학백분})).filter(s=>s.향상>0).sort((a,b)=>b.향상-a.향상||b.수학표준-a.수학표준||b.국어표준-a.국어표준);
    if(mi.length)res.mi=mi[0];
    const ti=bm.filter(s=>{const p=pm[s.번호];return p.국어백분>0&&p.수학백분>0&&p.탐1백분>0&&p.탐2백분>0;}).map(s=>({...s,향상:s.백분위합-pm[s.번호].백분위합,이전합:pm[s.번호].백분위합})).filter(s=>s.향상>0).sort((a,b)=>b.향상-a.향상||b.수학표준-a.수학표준||b.국어표준-a.국어표준);
    if(ti.length)res.ti=ti[0];
    S.dbg+=`\n향상: 양달응시${bm.length}명 / 수학후보${mi.length} / 총합후보${ti.length}`;
    if(res.mi)S.dbg+=`\n수학향상1위: ${res.mi.이름}(${res.mi.반}반) ${res.mi.이전수학}→${res.mi.수학백분}(+${res.mi.향상})`;
    if(res.ti)S.dbg+=`\n총합향상1위: ${res.ti.이름}(${res.ti.반}반) ${res.ti.이전합}→${res.ti.백분위합}(+${res.ti.향상})`;
  }
  return res;
}
function calcClassStats(){
  if(!S.curStudents?.length)return[];
  return[...new Set(S.curStudents.map(s=>s.반))].filter(b=>b>0).sort((a,b)=>a-b).map(ban=>{
    const g=S.curStudents.filter(s=>s.반===ban);const avg=f=>g.reduce((s,v)=>s+v[f],0)/g.length;
    return{반:ban,인원:g.length,환산:avg('환산'),국어:avg('국어표준'),수학:avg('수학표준'),탐1:avg('탐1표준'),탐2:avg('탐2표준')};
  });
}
function overallAvg(){if(!S.curStudents?.length)return 0;return S.curStudents.reduce((s,v)=>s+v.환산,0)/S.curStudents.length;}
function getAllWinners(){
  const ws=[];const r=S.results;const ac=SCONF.auto;
  const addA=(key,s,val)=>{const c=ac[key];if(!s||!c)return;ws.push({lbl:c.lbl,bc:c.bc,혜택:c.혜택,반:s.반,번호:s.번호,이름:s.이름,계열:s.계열,val,type:'auto',기존장학:S.exMap[String(s.번호)]||'',dup:[]});};
  if(r){
    addA('d1',r.d1,r.d1?.환산.toFixed(1));addA('d2',r.d2,r.d2?.환산.toFixed(1));addA('qt',r.qt,r.qt?.환산.toFixed(1));
    Object.entries(r.math||{}).forEach(([ban,s])=>{const c=ac.math;ws.push({lbl:`${c.lbl} (${ban}반)`,bc:c.bc,혜택:c.혜택,반:s.반,번호:s.번호,이름:s.이름,계열:s.계열,val:s.환산.toFixed(1),type:'auto',기존장학:S.exMap[String(s.번호)]||'',dup:[]});});
    if(r.mi){const c=ac.mi;ws.push({lbl:c.lbl,bc:c.bc,혜택:c.혜택,반:r.mi.반,번호:r.mi.번호,이름:r.mi.이름,계열:r.mi.계열,val:`+${r.mi.향상}`,type:'auto',기존장학:S.exMap[String(r.mi.번호)]||'',dup:[]});}
    if(r.ti){const c=ac.ti;ws.push({lbl:c.lbl,bc:c.bc,혜택:c.혜택,반:r.ti.반,번호:r.ti.번호,이름:r.ti.이름,계열:r.ti.계열,val:`+${r.ti.향상}`,type:'auto',기존장학:S.exMap[String(r.ti.번호)]||'',dup:[]});}
  } else {
    const saved=(S.accumulated[mkey()]?.winners||[]).filter(w=>w.type==='auto');
    saved.forEach(w=>ws.push({...w,dup:[]}));
  }
  ACTIVE_MANUAL.forEach(id=>{
    const mc=SCONF.manual[id];
    (S.manual[id]||[]).filter(row=>row.이름).forEach(row=>{ws.push({lbl:mc.lbl,bc:mc.bc,혜택:mc.혜택,반:row.반||'',번호:row.학번||'',이름:row.이름,계열:row.계열||'',val:row.환산점수||row.비고||'',type:'manual',기존장학:S.exMap[String(row.학번)]||'',dup:[]});});
  });
  const nc={};ws.forEach(w=>nc[w.이름]=(nc[w.이름]||0)+1);
  ws.forEach(w=>{if(nc[w.이름]>1)w.dup=ws.filter(x=>x.이름===w.이름&&x.lbl!==w.lbl).map(x=>x.lbl);});
  return ws;
}

function isBillboard(w){return BILL_IDS.some(id=>SCONF.manual[id]&&w.lbl===SCONF.manual[id].lbl);}

function pgStats(){
  let h=`<div class="ph"><h2>통계 & 누적</h2><p>반별 성적 추이 · 장학 인원 통계 · 학생별 수상 이력</p></div>`;
  const months=Object.keys(S.accumulated).sort();
  if(!months.length)return h+`<div class="notice">저장된 데이터가 없습니다. 최종 명단 탭에서 "이번달 저장"을 눌러 데이터를 쌓으세요.</div>`;

  const mhdr=months.map(k=>{const d=S.accumulated[k];const lbl=(d.label||mlbl(k)).replace(/\d{4}년 /,'');const jt=d.시험종류||'';return`<th>${lbl}${jt?`<br><span style='font-size:9px;font-weight:400'>(${jt})</span>`:''}</th>`;}).join('');
  const mhdrShort=months.map(k=>{const d=S.accumulated[k];return`<th>${(d.label||mlbl(k)).replace(/\d{4}년 /,'')}</th>`;}).join('');

  // ── 표1: 반별 환산표점 평균
  h+=`<div class="sec-title">📊 반별 환산표점 평균 추이</div>`;
  h+=`<div class="card"><div class="tw"><table class="stat-t"><thead><tr><th class="lh">반</th><th class="lh">반코드</th>${mhdr}</tr></thead><tbody>`;
  BAN_LIST.forEach(ban=>{
    h+=`<tr><td class="lh">${BAN_CODE[ban]||ban}</td><td class="lh" style="color:var(--mu);font-size:11px">${ban}</td>`;
    months.forEach(k=>{const s=(S.accumulated[k].classStats||[]).find(x=>String(x.반)===ban);h+=s?`<td>${(+s.환산).toFixed(1)}</td>`:`<td class="zero">–</td>`;});
    h+=`</tr>`;
  });
  h+=`<tr><td class="tot-lh">평균</td><td class="tot-lh" style="font-size:11px">전체</td>`;
  months.forEach(k=>{const d=S.accumulated[k];h+=d.overallAvg?`<td class="tot">${(+d.overallAvg).toFixed(1)}</td>`:`<td class="tot zero">–</td>`;});
  h+=`</tr></tbody></table></div></div>`;

  // ── 그래프
  if(months.length>=2){h+=`<div class="sec-title">📈 환산표점 평균 추이 그래프</div>`;h+=buildLineChart(months,S.accumulated);}

  // ── 표2: 서울 빌보드 인원 (반별, 인문/자연)
  h+=`<div class="sec-title">🏫 서울 빌보드 인원 (반별)</div>`;
  h+=`<div class="card"><div class="tw"><table class="stat-t"><thead><tr><th class="lh">반</th><th class="lh">반코드</th>`;
  months.forEach(k=>{const d=S.accumulated[k];h+=`<th colspan="2">${(d.label||mlbl(k)).replace(/\d{4}년 /,'')}</th>`;});
  h+=`</tr><tr><th class="lh"></th><th class="lh"></th>`;months.forEach(()=>{h+=`<th>인문</th><th>자연</th>`;});h+=`</tr></thead><tbody>`;
  BAN_LIST.forEach(ban=>{
    h+=`<tr><td class="lh">${BAN_CODE[ban]||ban}</td><td class="lh" style="color:var(--mu);font-size:11px">${ban}</td>`;
    months.forEach(k=>{
      const ws=(S.accumulated[k].winners||[]).filter(w=>!w.excluded&&isBillboard(w));
      const inH=ws.filter(w=>String(w.반)===ban&&getWinnerKye(w)==='인문').length;
      const inN=ws.filter(w=>String(w.반)===ban&&getWinnerKye(w)==='자연').length;
      h+=`<td class="${inH===0?'zero':''}">${inH||'–'}</td><td class="${inN===0?'zero':''}">${inN||'–'}</td>`;
    });h+=`</tr>`;
  });
  h+=`<tr><td class="tot-lh">계</td><td class="tot-lh" style="font-size:11px">전체</td>`;
  months.forEach(k=>{const ws=(S.accumulated[k].winners||[]).filter(w=>!w.excluded&&isBillboard(w));const inH=ws.filter(w=>getWinnerKye(w)==='인문').length;const inN=ws.filter(w=>getWinnerKye(w)==='자연').length;h+=`<td class="tot">${inH}</td><td class="tot">${inN}</td>`;});
  h+=`</tr></tbody></table></div></div>`;

  // ── 표3: 장학 종류별 인원
  h+=`<div class="sec-title">🏆 장학 종류별 수여 인원</div>`;
  const schRows=[
    {lbl:SCONF.manual.dasung_in.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.manual.dasung_in.lbl).length},
    {lbl:SCONF.manual.dasung_nat.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.manual.dasung_nat.lbl).length},
    {lbl:SCONF.auto.d1.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.auto.d1.lbl).length},
    {lbl:SCONF.auto.d2.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.auto.d2.lbl).length},
    {lbl:SCONF.auto.qt.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.auto.qt.lbl).length},
    {lbl:'각 수학반 1등',fn:ws=>ws.filter(w=>w.lbl.startsWith(SCONF.auto.math.lbl)).length},
    {lbl:SCONF.auto.mi.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.auto.mi.lbl).length},
    {lbl:SCONF.auto.ti.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.auto.ti.lbl).length},
    {lbl:SCONF.manual.improve_gift.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.manual.improve_gift.lbl).length},
    {lbl:SCONF.manual.honor_in.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.manual.honor_in.lbl).length},
    {lbl:SCONF.manual.honor_nat.lbl,fn:ws=>ws.filter(w=>w.lbl===SCONF.manual.honor_nat.lbl).length},
  ];
  h+=`<div class="card"><div class="tw"><table class="stat-t"><thead><tr><th class="lh">장학</th>${mhdrShort}</tr></thead><tbody>`;
  schRows.forEach(({lbl,fn})=>{
    h+=`<tr><td class="lh">${lbl}</td>`;
    months.forEach(k=>{const ws=(S.accumulated[k].winners||[]).filter(w=>!w.excluded);const cnt=fn(ws);h+=`<td class="${cnt===0?'zero':''}">${cnt||'–'}</td>`;});
    h+=`</tr>`;
  });
  h+=`<tr><td class="tot-lh">계</td>`;
  months.forEach(k=>{const ws=(S.accumulated[k].winners||[]).filter(w=>!w.excluded);h+=`<td class="tot">${ws.length}</td>`;});
  h+=`</tr></tbody></table></div></div>`;

  // ── 학생별 수상이력
  h+=`<div class="sec-title">📋 학생별 수상 이력</div>`;
  const stuMap={};
  months.forEach(k=>{
    (S.accumulated[k].winners||[]).filter(w=>!w.excluded).forEach(w=>{
      const key=String(w.번호||w.이름);
      if(!stuMap[key])stuMap[key]={반:w.반,학번:w.번호||'',이름:w.이름,months:{}};
      const abbrev=w.혜택==='식비 100%'?'식비100%':w.혜택==='식비 50%'?'식비50%':w.혜택.includes('독서실비')?'독서실비100%':w.혜택.includes('교습비')?'교습비100%':'매점5만';
      if(!stuMap[key].months[k])stuMap[key].months[k]=[];
      stuMap[key].months[k].push(abbrev);
    });
  });
  const stus=Object.values(stuMap).sort((a,b)=>{const da=Number(a.반)||99,db=Number(b.반)||99;return da!==db?da-db:Number(a.학번)-Number(b.학번);});
  if(!stus.length){h+=`<div class="notice">저장된 수상 이력이 없습니다.</div>`;}
  else{
    const bc=v=>v.includes('교습비')||v.includes('식비')?'color:var(--red);font-weight:600':v.includes('독서실비')?'color:var(--blue);font-weight:600':'color:var(--amber)';
    h+=`<div class="card"><div class="tw"><table class="stat-t"><thead><tr><th>No</th><th>반</th><th>학번</th><th class="lh">이름</th>${months.map(k=>`<th>${(S.accumulated[k].label||mlbl(k)).replace(/\d{4}년 /,'')}</th>`).join('')}</tr></thead><tbody>`;
    stus.forEach((s,idx)=>{
      h+=`<tr><td style="color:var(--mu);font-size:11px">${idx+1}</td><td>${s.반?s.반+'반':''}</td><td class="nn">${s.학번||'–'}</td><td class="lh nm">${s.이름}</td>`;
      months.forEach(k=>{const vals=s.months[k]||[];h+=vals.length?`<td style="font-size:10px">${vals.map(v=>`<div style="${bc(v)}">${v}</div>`).join('')}</td>`:`<td class="zero"></td>`;});
      h+=`</tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }
  return h;
}

function pgSettings(){
  let h=`<div class="ph"><h2>장학 설정</h2><p>장학 이름과 혜택을 수정하면 모든 탭에 즉시 반영 · Firestore에 저장하면 영구 적용</p></div>`;
  h+=`<div class="btn-row"><button class="btn btn-g" onclick="saveSettings().then(()=>render())">☁ 설정 저장 (Firestore)</button><span style="font-size:11px;color:var(--mu)">저장 후 새로고침해도 유지됩니다</span></div>`;
  h+=`<div class="sec-title">자동 산출 장학 (이름과 혜택만 수정 가능)</div>`;
  h+=`<div class="card"><div style="padding:12px 14px">`;
  h+=`<div style="display:grid;grid-template-columns:100px 1fr 1fr 1fr;gap:8px;font-size:10px;color:var(--mu);padding:4px 0;border-bottom:1px solid var(--bo);margin-bottom:4px"><span>구분</span><span>장학 이름</span><span>혜택</span><span>기준 (참고용)</span></div>`;
  Object.entries(SCONF.auto).forEach(([id,c])=>{
    h+=`<div style="display:grid;grid-template-columns:100px 1fr 1fr 1fr;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bo2)">
      <span style="font-size:11px;color:var(--mu)">${id}</span>
      <input class="fi" value="${c.lbl}" oninput="SCONF.auto['${id}'].lbl=this.value">
      <input class="fi" value="${c.혜택}" oninput="SCONF.auto['${id}'].혜택=this.value">
      <input class="fi" value="${c.기준||''}" oninput="SCONF.auto['${id}'].기준=this.value" placeholder="기준 입력...">
    </div>`;
  });
  h+=`</div></div>`;
  h+=`<div class="sec-title">수기 입력 장학</div>`;
  h+=`<div class="card"><div style="padding:12px 14px">`;
  h+=`<div style="display:grid;grid-template-columns:120px 1fr 1fr 80px;gap:8px;font-size:10px;color:var(--mu);padding:4px 0;border-bottom:1px solid var(--bo);margin-bottom:4px"><span>구분</span><span>장학 이름</span><span>혜택</span><span>드롭다운</span></div>`;
  Object.entries(SCONF.manual).forEach(([id,c])=>{
    const isActive=ACTIVE_MANUAL.includes(id);
    h+=`<div style="display:grid;grid-template-columns:120px 1fr 1fr 80px;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bo2)">
      <span style="font-size:10px;color:var(--mu)">${id}</span>
      <input class="fi" value="${c.lbl}" oninput="SCONF.manual['${id}'].lbl=this.value">
      <input class="fi" value="${c.혜택}" oninput="SCONF.manual['${id}'].혜택=this.value">
      <span style="font-size:11px;${isActive?'color:var(--green);font-weight:500':'color:var(--mu)'}">${isActive?'✓ 표시':''}</span>
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

function buildLineChart(months,acc){
  const W=580,H=220,PL=50,PR=65,PT=20,PB=46;
  const iW=W-PL-PR,iH=H-PT-PB;const n=months.length;
  const ovAvgs=months.map(k=>+(acc[k].overallAvg||0));
  const banSet=new Set();
  months.forEach(k=>(acc[k].classStats||[]).forEach(s=>banSet.add(String(s.반))));
  const bans=[...banSet].sort((a,b)=>a-b);
  const banData={};
  bans.forEach(b=>{banData[b]=months.map(k=>{const s=(acc[k].classStats||[]).find(x=>String(x.반)===b);return s?+s.환산:null;});});
  let allVals=[...ovAvgs.filter(v=>v>0)];
  bans.forEach(b=>allVals.push(...banData[b].filter(v=>v!==null)));
  if(!allVals.length)return'';
  const mn=Math.min(...allVals),mx=Math.max(...allVals);
  const pad=(mx-mn)*0.12||5;const lo=mn-pad,hi=mx+pad;
  const xp=i=>PL+i*(iW/Math.max(n-1,1));const yp=v=>PT+iH-(((v-lo)/(hi-lo))*iH);
  const COLORS=['#1a5fa0','#1e7a45','#a06010','#c0362a','#7b5fa0','#1a9090','#a05080','#608040'];
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;display:block;margin:0 auto;overflow:visible">`;
  for(let i=0;i<=4;i++){const y=PT+iH*(i/4);const v=(hi-lo)*(1-i/4)+lo;svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--bo2)" stroke-width="1"/><text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="var(--mu)">${v.toFixed(0)}</text>`;}
  months.forEach((k,i)=>{
    const d=acc[k];const line1=(d.label||mlbl(k)).replace(/\d{4}년 /,'');const line2=d.시험종류||'';
    svg+=`<text x="${xp(i)}" y="${H-PB+14}" text-anchor="middle" font-size="9" fill="var(--mu)">${line1}</text>`;
    if(line2)svg+=`<text x="${xp(i)}" y="${H-PB+24}" text-anchor="middle" font-size="8" fill="var(--mu2)">(${line2})</text>`;
    svg+=`<line x1="${xp(i)}" y1="${PT}" x2="${xp(i)}" y2="${H-PB}" stroke="var(--bo2)" stroke-width="1"/>`;
  });
  bans.forEach((b,ci)=>{
    const pts=banData[b];const col=COLORS[ci%COLORS.length];let path='';
    pts.forEach((v,i)=>{if(v===null)return;if(!path)path=`M${xp(i)},${yp(v)}`;else path+=`L${xp(i)},${yp(v)}`;});
    if(path)svg+=`<path d="${path}" fill="none" stroke="${col}" stroke-width="1.5" stroke-dasharray="4 2" opacity=".7"/>`;
    let lastIdx=-1;
    pts.forEach((v,i)=>{if(v!==null){svg+=`<circle cx="${xp(i)}" cy="${yp(v)}" r="3" fill="${col}" opacity=".8"><title>${acc[months[i]].label||months[i]} ${b}반: ${v.toFixed(1)}</title></circle>`;lastIdx=i;}});
    if(lastIdx>=0&&banData[b][lastIdx]!==null)svg+=`<text x="${xp(lastIdx)+9}" y="${yp(banData[b][lastIdx])+4}" font-size="9" fill="${col}" font-weight="600">${BAN_CODE[b]||b}</text>`;
  });
  let oPath='';ovAvgs.forEach((v,i)=>{if(v>0)oPath+=(!oPath?`M${xp(i)},${yp(v)}`:`L${xp(i)},${yp(v)}`);});
  if(oPath)svg+=`<path d="${oPath}" fill="none" stroke="var(--gold)" stroke-width="2.5"/>`;
  ovAvgs.forEach((v,i)=>{if(!v)return;svg+=`<circle cx="${xp(i)}" cy="${yp(v)}" r="4" fill="var(--gold)"><title>${acc[months[i]].label||months[i]} 전체: ${v.toFixed(1)}</title></circle><text x="${xp(i)}" y="${yp(v)-8}" text-anchor="middle" font-size="9" fill="var(--gold2)" font-weight="700">${v.toFixed(1)}</text>`;});
  svg+=`</svg>`;
  let legend=`<div style="display:flex;flex-wrap:wrap;gap:5px 12px;padding:6px 10px 10px;font-size:11px"><span style="color:var(--gold);font-weight:700">● 전체평균</span>`;
  bans.forEach((b,ci)=>{legend+=`<span style="color:${COLORS[ci%COLORS.length]};opacity:.85">-- ${BAN_CODE[b]||b}반(${b})</span>`;});
  legend+=`</div>`;
  return`<div class="card" style="margin-bottom:12px"><div style="padding:12px 8px 0">${svg}</div>${legend}</div>`;
}

function ubH(id,lbl,sub){
  const file=id==='cur'?S.curFile:id==='prev'?S.prevFile:S.exFile;
  return`<div class="ub${file?' done':''}" id="ub-${id}"><div class="lbl">${lbl}</div><div class="sub">${sub}</div>${file?`<div class="fn">✓ ${file}</div><div class="rst" onclick="event.stopPropagation();resetF('${id}')">변경</div>`:`<div class="sub" style="margin-top:5px">클릭 또는 드래그</div>`}</div>`;
}
function resetF(id){
  if(id==='cur'){S.curStudents=null;S.curFile=null;S.results=null;}
  else if(id==='prev'){S.prevStudents=null;S.prevFile=null;if(S.curStudents)S.results=calcResults();}
  else{S.exMap={};S.exFile=null;}
  S.dbg='';render();
}
function handleFile(id,file){
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const buf=new Uint8Array(ev.target.result);
      if(id==='ex'){S.exMap=parseExisting(buf);S.exFile=file.name;S.err=null;render();return;}
      const st=parseScores(buf);if(!st.length)throw new Error('학생 데이터를 찾을 수 없습니다.');
      if(id==='cur'){S.curStudents=st;S.curFile=file.name;}else{S.prevStudents=st;S.prevFile=file.name;}
      S.err=null;if(S.curStudents)S.results=calcResults();render();
    }catch(e){S.err=e.message;render();}
  };
  rd.readAsArrayBuffer(file);
}
function bindSlots(){
  ['cur','prev','ex'].forEach(id=>{
    const el=document.getElementById(`ub-${id}`);if(!el)return;
    el.onclick=()=>document.getElementById(`fi-${id}`).click();
    el.ondragover=e=>{e.preventDefault();el.classList.add('drag')};
    el.ondragleave=()=>el.classList.remove('drag');
    el.ondrop=e=>{e.preventDefault();el.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(id,e.dataTransfer.files[0]);};
  });
}
['cur','prev','ex'].forEach(id=>{const el=document.getElementById(`fi-${id}`);if(el)el.onchange=()=>{if(el.files[0]){handleFile(id,el.files[0]);el.value='';}}; });
initManual();
</script>
