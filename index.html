<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>QUETTA 장학 관리 시스템</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f9f9f7;--bg2:#ffffff;--bg3:#f0efe9;--bg4:#e8e7e0;
  --gold:#b5681e;--gold2:#8a4e16;--goldb:rgba(181,104,30,.1);
  --w:#1a1a18;--w2:#2e2e2a;
  --mu:#6b6b63;--mu2:#8c8c82;--mu3:rgba(26,26,24,.06);
  --bo:#d8d8d0;--bo2:#e8e8e0;
  --green:#1e7a45;--blue:#1a5fa0;--red:#c0362a;--amber:#a06010;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--w);font-size:13px;line-height:1.6;min-height:100vh}

/* ── Login ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--bg2);border:1px solid var(--bo);border-radius:14px;padding:36px 32px;width:340px;text-align:center}
.login-box h1{font-size:22px;font-weight:700;color:var(--gold);letter-spacing:.05em;margin-bottom:4px}
.login-box p{font-size:12px;color:var(--mu);margin-bottom:28px}
.login-box input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--bo);border-radius:7px;color:var(--w);font-size:13px;margin-bottom:10px;font-family:inherit}
.login-box input:focus{outline:none;border-color:rgba(201,168,76,.5)}
.login-box button{width:100%;padding:11px;background:var(--gold);border:none;border-radius:7px;color:var(--bg);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.login-box button:hover{background:var(--gold2)}
.login-err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px}

/* ── App Layout ── */
.app{display:flex;min-height:100vh}
.sb{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--bo);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{padding:18px 16px 14px;border-bottom:1px solid var(--bo)}
.brand h1{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.05em}
.brand p{font-size:10px;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:.07em}
nav{padding:10px 8px;flex:1}
.nsec{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);padding:0 8px;margin:12px 0 4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;color:var(--mu);font-size:12px;transition:all .15s;user-select:none}
.ni:hover{background:var(--mu3);color:var(--w2)}
.ni.on{background:var(--goldb);color:var(--gold2);font-weight:500}
.ni i{font-size:13px;width:16px;text-align:center;font-style:normal}
.mbar{padding:12px 14px;border-top:1px solid var(--bo)}
.mbar label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.mbar-row{display:flex;gap:4px;align-items:center;font-size:11px;color:var(--mu)}
.mbar input{background:var(--bg3);border:1px solid var(--bo);border-radius:5px;color:var(--w);font-size:12px;padding:4px 6px}
.mbar input:focus{outline:none;border-color:var(--gold)}
.my{font-size:14px;font-weight:700;color:var(--gold2);margin-top:6px}
.logout-btn{margin:10px 14px;padding:6px;background:transparent;border:1px solid var(--bo);border-radius:6px;color:var(--mu);font-size:11px;cursor:pointer;width:calc(100% - 28px);font-family:inherit}
.logout-btn:hover{background:var(--mu3);color:var(--w2)}
.user-info{font-size:10px;color:var(--mu);padding:0 14px 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
main{flex:1;min-width:0;padding:24px 28px;overflow-x:hidden}

/* ── Components ── */
.ph{margin-bottom:18px}
.ph h2{font-size:18px;font-weight:700}
.ph p{font-size:12px;color:var(--mu);margin-top:3px}
.urow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.ub{border:1.5px dashed var(--bo);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;text-align:center}
.ub:hover,.ub.drag{border-color:rgba(201,168,76,.45);background:var(--bg4)}
.ub.done{border-style:solid;border-color:rgba(93,168,122,.4);background:var(--bg3)}
.ub .lbl{font-size:11px;font-weight:500;color:var(--w2);margin-bottom:2px}
.ub .sub{font-size:10px;color:var(--mu)}
.ub .fn{font-size:10px;color:var(--green);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ub .rst{font-size:10px;color:var(--mu);text-decoration:underline;cursor:pointer;margin-top:2px}
.dbg{background:var(--bg3);border-radius:7px;padding:7px 11px;font-size:10px;color:var(--mu);font-family:monospace;line-height:1.7;white-space:pre-wrap;margin-bottom:12px}
.mets{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px}
.met{background:var(--bg3);border:1px solid var(--bo);border-radius:9px;padding:12px 14px;position:relative;overflow:hidden}
.met::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);opacity:.4}
.met .l{font-size:10px;color:var(--mu);letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px}
.met .v{font-size:22px;font-weight:700}
.card{background:var(--bg2);border:1px solid var(--bo);border-radius:10px;overflow:hidden;margin-bottom:12px}
.ch{padding:9px 14px;background:var(--bg3);border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ch .ct{font-size:12px;font-weight:500;color:var(--w2)}
.ch .cs{font-size:10px;color:var(--mu);margin-left:auto}
.tw{overflow-x:auto}
table.t{width:100%;border-collapse:collapse;font-size:12px}
table.t th{padding:5px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--bo);font-size:10px;color:var(--mu);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
table.t td{padding:6px 10px;border-bottom:1px solid var(--bo2);white-space:nowrap;color:var(--w2)}
table.t tr:last-child td{border-bottom:none}
table.t tr:hover td{background:var(--mu3)}
table.t tr.ex td{text-decoration:line-through;opacity:.45}
.nm{font-weight:500;color:var(--w)}
.nn{font-family:monospace}
.dim{color:var(--mu);font-size:11px}
.iv{color:var(--green);font-weight:500}
.neg{color:var(--red)}
.rk1{color:var(--amber);font-weight:700}
.bx{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.bq{background:rgba(201,168,76,.18);color:var(--gold2);border:1px solid rgba(201,168,76,.3)}
.bd{background:rgba(93,168,122,.15);color:var(--green);border:1px solid rgba(93,168,122,.25)}
.bm{background:rgba(91,155,213,.15);color:var(--blue);border:1px solid rgba(91,155,213,.25)}
.bg{background:rgba(80,190,100,.15);color:#5dc870;border:1px solid rgba(80,190,100,.25)}
.bb{background:rgba(212,160,57,.15);color:var(--amber);border:1px solid rgba(212,160,57,.25)}
.dup{display:inline-flex;align-items:center;padding:1px 5px;border-radius:8px;background:rgba(217,124,106,.2);color:var(--red);font-size:10px;margin-left:4px;border:.5px solid rgba(217,124,106,.3)}
.mg{background:var(--bg2);border:1px solid var(--bo);border-radius:10px;overflow:hidden;margin-bottom:10px}
.mgh{padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:8px}
.mgt{font-size:12px;font-weight:500}
.mgb{padding:10px 14px}
.mgr{display:flex;gap:5px;margin-bottom:5px;align-items:center}
.fi{padding:4px 7px;border:1px solid var(--bo);border-radius:5px;background:var(--bg3);color:var(--w);font-size:12px;font-family:inherit;min-width:0}
.fi:focus{outline:none;border-color:rgba(201,168,76,.5)}
.rdel{background:none;border:none;cursor:pointer;color:var(--mu);font-size:13px;padding:2px;line-height:1;flex-shrink:0}
.rdel:hover{color:var(--red)}
.addbtn{font-size:11px;padding:4px 10px;border:1px dashed var(--bo);border-radius:5px;background:transparent;cursor:pointer;color:var(--mu);margin-top:4px}
.addbtn:hover{background:var(--mu3)}
.sv{font-size:10px;color:var(--mu);margin-left:auto}
.btn{padding:6px 14px;border:1px solid var(--bo);border-radius:7px;background:transparent;cursor:pointer;font-size:12px;color:var(--w);font-family:inherit;transition:all .15s}
.btn:hover{background:var(--mu3)}
.btn-g{border-color:rgba(201,168,76,.5);color:var(--gold2);background:var(--goldb)}
.btn-g:hover{background:rgba(201,168,76,.2)}
.btn-gr{border-color:rgba(93,168,122,.4);color:var(--green);background:rgba(93,168,122,.1)}
.btn-gr:hover{background:rgba(93,168,122,.2)}
.btn-b{border-color:rgba(91,155,213,.4);color:var(--blue);background:rgba(91,155,213,.1)}
.btn-b:hover{background:rgba(91,155,213,.2)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--bg3);border:1px solid var(--bo);border-radius:9px;padding:12px}
.sc .ban{font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:6px}
.sc .row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid var(--bo2)}
.sc .row:last-child{border-bottom:none}
.sc .k{color:var(--mu)}
.notice{background:rgba(91,155,213,.1);border:1px solid rgba(91,155,213,.2);border-radius:7px;padding:8px 12px;font-size:12px;color:var(--blue);margin-bottom:12px}
.err-box{background:rgba(217,124,106,.1);border:1px solid rgba(217,124,106,.2);border-radius:7px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:12px}
.empty{text-align:center;padding:24px;color:var(--mu);font-size:12px}
.sec-title{font-size:13px;font-weight:500;color:var(--w2);margin:18px 0 10px}
.saving{font-size:11px;color:var(--mu);margin-left:8px}
.sync-ok{color:var(--green)}
input[type=checkbox]{cursor:pointer;accent-color:var(--gold);width:13px;height:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bo);border-radius:3px}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>QUETTA</h1>
    <p>장학 관리 시스템</p>
    <input type="password" id="li-pw" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">로그인</button>
    <div class="login-err" id="li-err"></div>
  </div>
</div>

<!-- App -->
<div class="app" id="app-screen" style="display:none">
  <aside class="sb" id="sb"></aside>
  <main id="main"></main>
</div>

<!-- Hidden file inputs -->
<input type="file" id="fi-cur"  accept=".xlsx,.xls" style="display:none">
<input type="file" id="fi-prev" accept=".xlsx,.xls" style="display:none">
<input type="file" id="fi-ex"   accept=".xlsx,.xls" style="display:none">

<script>
// ── Firebase Init ─────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyBQ3V-4EYiIKShPmfuNwhPMz-WiiTzi6CM",
  authDomain:"grades-of-test.firebaseapp.com",
  projectId:"grades-of-test",
  storageBucket:"grades-of-test.firebasestorage.app",
  messagingSenderId:"607351091085",
  appId:"1:607351091085:web:19b3b42ee58bb0045f57c4"
});
const auth=firebase.auth();
const db=firebase.firestore();

// ── Login ─────────────────────────────────
async function doLogin(){
  const em='campusk@dshw.co.kr'; // 고정 계정
  const pw=document.getElementById('li-pw').value;
  document.getElementById('li-err').textContent='';
  try{
    await auth.signInWithEmailAndPassword(em,pw);
  }catch(e){
    const msgs={'auth/user-not-found':'존재하지 않는 계정입니다','auth/wrong-password':'비밀번호가 틀렸습니다','auth/invalid-email':'이메일 형식을 확인해 주세요','auth/too-many-requests':'잠시 후 다시 시도해 주세요'};
    document.getElementById('li-err').textContent=msgs[e.code]||e.message;
  }
}
auth.onAuthStateChanged(async user=>{
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='flex';
    S.userEmail=user.email;
    await loadFromFirestore();
    render();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});
function doLogout(){auth.signOut();}

// ── Constants ─────────────────────────────────
const ENG_D={1:0,2:.5,3:2,4:4,5:6,6:8,7:10,8:12,9:14};
const COL={반:2,번호:3,이름:4,계열:5,국어표준:12,국어백분:13,수학표준:26,수학백분:27,영어등급:36,탐1표준:55,탐1백분:56,탐2표준:66,탐2백분:67};
const MDEFS=[
  {id:'dasung_in', lbl:'대성학원 전체 1등 (인문)',bc:'bq',혜택:'수강료 100%',multi:false,cols:['반','학번','이름','환산점수','비고']},
  {id:'dasung_nat',lbl:'대성학원 전체 1등 (자연)',bc:'bq',혜택:'수강료 100%',multi:false,cols:['반','학번','이름','환산점수','비고']},
  {id:'quetta_in', lbl:'QUETTA 장학 (인문)',       bc:'bq',혜택:'수강료 100%',multi:false,cols:['반','학번','이름','환산점수','비고']},
  {id:'quetta_nat',lbl:'QUETTA 장학 (자연)',       bc:'bq',혜택:'수강료 100%',multi:false,cols:['반','학번','이름','환산점수','비고']},
  {id:'billboard_in', lbl:'서울 빌보드 (인문)',    bc:'bb',혜택:'매점상품권 5만원권',multi:true,cols:['반','학번','이름','환산점수','비고']},
  {id:'billboard_nat',lbl:'서울 빌보드 (자연)',    bc:'bb',혜택:'매점상품권 5만원권',multi:true,cols:['반','학번','이름','환산점수','비고']},
  {id:'honor_in',  lbl:'성적우수자 (인문)',         bc:'bb',혜택:'매점상품권 5만원권',multi:true,cols:['반','학번','이름','환산점수','비고']},
  {id:'honor_nat', lbl:'성적우수자 (자연)',         bc:'bb',혜택:'매점상품권 5만원권',multi:true,cols:['반','학번','이름','환산점수','비고']},
  {id:'improve_gift',lbl:'성적 향상',              bc:'bg',혜택:'매점상품권 5만원권',multi:true,cols:['반','학번','이름','비고']},
];

// ── State ─────────────────────────────────
let S={
  tab:'results',curYear:'2026',curMonth:'3',monthConfirmed:false,
  curStudents:null,prevStudents:null,
  curFile:null,prevFile:null,exFile:null,
  exMap:{},results:null,manual:{},
  excluded:new Set(),accumulated:{},
  dbg:'',err:null,syncMsg:'',userEmail:'',
};
let _ws=[];
MDEFS.forEach(d=>{S.manual[d.id]=[erow(d)];});
function erow(d){const r={};d.cols.forEach(c=>r[c]='');return r;}
function mkey(){return`${S.curYear}-${S.curMonth.padStart(2,'0')}`;}
function fmtKey(k){
  // "2026-04" → "2026년 4월"
  const m=k.match(/^(\d{4})-(\d{2})$/);
  return m?`${m[1]}년 ${parseInt(m[2])}월`:k;
}

// ── Firestore ─────────────────────────────────
async function loadFromFirestore(){
  try{
    const snap=await db.collection('quetta_data').get();
    S.accumulated={};
    snap.forEach(doc=>{S.accumulated[doc.id]=doc.data();});
    // 이번달 manual 불러오기
    const mk=mkey();
    if(S.accumulated[mk]&&S.accumulated[mk].manual){
      MDEFS.forEach(d=>{
        if(S.accumulated[mk].manual[d.id])S.manual[d.id]=S.accumulated[mk].manual[d.id];
      });
    }
    if(S.accumulated[mk]&&S.accumulated[mk].excluded){
      S.excluded=new Set(S.accumulated[mk].excluded);
    }
    setSyncMsg('✓ 불러오기 완료');
  }catch(e){setSyncMsg('⚠ 불러오기 실패: '+e.message);}
}

async function saveToFirestore(){
  const mk=mkey();
  const ws=getAllWinners();
  const data={
    label:`${S.curYear}년 ${S.curMonth}월`,
    winners:ws.map(w=>({...w,excluded:S.excluded.has(wkey(w)),기존장학:S.exMap[String(w.번호)]||w.기존장학||''})),
    classStats:calcClassStats(),
    overallAvg:overallAvg(),
    manual:S.manual,
    excluded:[...S.excluded],
    savedAt:new Date().toISOString(),
  };
  try{
    setSyncMsg('저장 중...');
    await db.collection('quetta_data').doc(mk).set(data);
    S.accumulated[mk]=data;
    setSyncMsg('✓ 저장 완료 ('+new Date().toLocaleTimeString('ko-KR')+')');
  }catch(e){setSyncMsg('⚠ 저장 실패: '+e.message);}
}

async function autoSaveManual(){
  // manual 변경 시 Firestore 자동 저장
  clearTimeout(window._ast);
  window._ast=setTimeout(async()=>{
    const mk=mkey();
    try{
      await db.collection('quetta_data').doc(mk).set({manual:S.manual,excluded:[...S.excluded]},{merge:true});
      setSyncMsg('✓ 자동저장 완료');
    }catch(e){}
  },1000);
}

function setSyncMsg(m){S.syncMsg=m;const el=document.getElementById('sync-msg');if(el)el.textContent=m;}

// ── Excel Parsing ─────────────────────────────────
function parseScores(buf){
  const wb=XLSX.read(buf,{type:'array'});
  const wsn=wb.SheetNames.find(n=>n==='성적')||wb.SheetNames[0];
  const raw=XLSX.utils.sheet_to_json(wb.Sheets[wsn],{header:1,defval:''});
  const toN=v=>{const x=parseFloat(String(v||'').replace(/,/g,''));return isNaN(x)?0:x;};
  let ds=0;
  for(let i=0;i<Math.min(15,raw.length);i++){
    const nm=String(raw[i][COL.이름]||'').trim();
    const bn=parseFloat(String(raw[i][COL.번호]||'').replace(/,/g,''));
    if(nm&&nm!=='이름'&&!isNaN(bn)&&bn>0){ds=i;break;}
  }
  const arr=[];
  for(let i=ds;i<raw.length;i++){
    const r=raw[i];
    const 이름=String(r[COL.이름]||'').trim();if(!이름)continue;
    const 번호=toN(r[COL.번호]);if(!번호)continue;
    const eng=Math.round(toN(r[COL.영어등급]))||9;
    const d2=ENG_D[eng]??14;
    const 국어표준=toN(r[COL.국어표준]),수학표준=toN(r[COL.수학표준]);
    const 탐1표준=toN(r[COL.탐1표준]),탐2표준=toN(r[COL.탐2표준]);
    arr.push({
      반:Number(r[COL.반])||0,번호,이름,계열:String(r[COL.계열]||'').trim(),
      국어표준,국어백분:toN(r[COL.국어백분]),
      수학표준,수학백분:toN(r[COL.수학백분]),
      영어등급:eng,탐1표준,탐1백분:toN(r[COL.탐1백분]),
      탐2표준,탐2백분:toN(r[COL.탐2백분]),
      환산:국어표준+수학표준+탐1표준+탐2표준-d2,
      백분위합:toN(r[COL.국어백분])+toN(r[COL.수학백분])+toN(r[COL.탐1백분])+toN(r[COL.탐2백분]),
    });
  }
  S.dbg=`시트:"${wsn}" ${raw.length}행 → ${arr.length}명 파싱 완료`;
  return arr;
}
function parseExisting(buf){
  const wb=XLSX.read(buf,{type:'array'});
  const raw=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
  const map={};
  for(let i=1;i<raw.length;i++){
    const hb=String(raw[i][9]||'').trim();   // J열: 학번
    const jl=String(raw[i][3]||'').trim();   // D열: 장학명
    if(hb&&jl)map[hb]=map[hb]?map[hb]+', '+jl:jl;
  }
  return map;
}

// ── Calculations ─────────────────────────────────
function calcResults(){
  const cur=S.curStudents,prev=S.prevStudents;
  const res={};
  const bh=[...cur].sort((a,b)=>b.환산-a.환산||b.수학표준-a.수학표준||b.국어표준-a.국어표준);
  res.d1=bh[0]||null;res.d2=bh[1]||null;res.qt=bh[2]||null;
  res.math={};
  [...new Set(cur.map(s=>s.반))].filter(b=>b>0).sort((a,b)=>a-b).forEach(ban=>{
    const g=cur.filter(s=>s.반===ban).sort((a,b)=>b.환산-a.환산||b.수학표준-a.수학표준||b.국어표준-a.국어표준);
    if(g.length)res.math[ban]=g[0];
  });
  res.mi=null;res.ti=null;
  if(prev?.length){
    const pm={};prev.forEach(s=>pm[s.번호]=s);
    const bm=cur.filter(s=>pm[s.번호]!==undefined);
    const mi=bm.filter(s=>pm[s.번호].수학백분>0)
      .map(s=>({...s,향상:s.수학백분-pm[s.번호].수학백분,이전수학:pm[s.번호].수학백분}))
      .filter(s=>s.향상>0)
      .sort((a,b)=>b.향상-a.향상||b.수학표준-a.수학표준||b.국어표준-a.국어표준);
    if(mi.length)res.mi=mi[0];
    const ti=bm.filter(s=>{const p=pm[s.번호];return p.국어백분>0&&p.수학백분>0&&p.탐1백분>0&&p.탐2백분>0;})
      .map(s=>({...s,향상:s.백분위합-pm[s.번호].백분위합,이전합:pm[s.번호].백분위합}))
      .filter(s=>s.향상>0)
      .sort((a,b)=>b.향상-a.향상||b.수학표준-a.수학표준||b.국어표준-a.국어표준);
    if(ti.length)res.ti=ti[0];
    S.dbg+=`\n향상: 양달응시${bm.length}명 / 수학후보${mi.length} / 총합후보${ti.length}`;
    if(res.mi)S.dbg+=`\n수학향상1위: ${res.mi.이름}(${res.mi.반}반) ${res.mi.이전수학}→${res.mi.수학백분}(+${res.mi.향상})`;
    if(res.ti)S.dbg+=`\n총합향상1위: ${res.ti.이름}(${res.ti.반}반) ${res.ti.이전합}→${res.ti.백분위합}(+${res.ti.향상})`;
  }
  return res;
}
function calcClassStats(){
  if(!S.curStudents?.length)return[];
  return[...new Set(S.curStudents.map(s=>s.반))].filter(b=>b>0).sort((a,b)=>a-b).map(ban=>{
    const g=S.curStudents.filter(s=>s.반===ban);
    const avg=f=>g.reduce((s,v)=>s+v[f],0)/g.length;
    return{반:ban,인원:g.length,환산:avg('환산'),국어:avg('국어표준'),수학:avg('수학표준'),탐1:avg('탐1표준'),탐2:avg('탐2표준')};
  });
}
function overallAvg(){
  if(!S.curStudents?.length)return 0;
  return S.curStudents.reduce((s,v)=>s+v.환산,0)/S.curStudents.length;
}

// ── Winners ─────────────────────────────────
function getAllWinners(){
  const ws=[];
  const r=S.results;
  const addA=(lbl,bc,혜택,s,val)=>{
    if(!s)return;
    ws.push({lbl,bc,혜택,반:s.반,번호:s.번호,이름:s.이름,계열:s.계열,val,type:'auto',기존장학:S.exMap[String(s.번호)]||'',dup:[]});
  };
  if(r){
    addA('다이닝 장학','bd','식비 100%',r.d1,r.d1?.환산.toFixed(1));
    addA('다이닝 하프 장학','bd','식비 50%',r.d2,r.d2?.환산.toFixed(1));
    addA('퀀텀 장학','bm','독서실비 100%',r.qt,r.qt?.환산.toFixed(1));
    Object.entries(r.math||{}).forEach(([ban,s])=>addA(`수학반 1등 (${ban}반)`,'bm','독서실비 100%',s,s.환산.toFixed(1)));
    if(r.mi)addA('수학백분위 최고 향상','bg','매점상품권',r.mi,`+${r.mi.향상}`);
    if(r.ti)addA('백분위총합 최고 향상','bg','매점상품권',r.ti,`+${r.ti.향상}`);
  } else {
    // 엑셀 미업로드: Firestore에 저장된 자동산출 결과 복원
    const saved=(S.accumulated[mkey()]?.winners||[]).filter(w=>w.type==='auto');
    saved.forEach(w=>ws.push({...w,dup:[]}));
  }
  MDEFS.forEach(d=>{
    (S.manual[d.id]||[]).filter(row=>row.이름).forEach(row=>{
      ws.push({lbl:d.lbl,bc:d.bc,혜택:d.혜택,반:row.반||'',번호:row.학번||'',이름:row.이름,계열:row.계열||'',val:row.환산점수||row.비고||'',type:'manual',기존장학:S.exMap[String(row.학번)]||'',dup:[]});
    });
  });
  const nc={};ws.forEach(w=>nc[w.이름]=(nc[w.이름]||0)+1);
  ws.forEach(w=>{if(nc[w.이름]>1)w.dup=ws.filter(x=>x.이름===w.이름&&x.lbl!==w.lbl).map(x=>x.lbl);});
  return ws;
}
function wkey(w){return`${w.이름}::${w.lbl}`;}

// ── Manual ─────────────────────────────────
function upd(id,ri,fld,val){S.manual[id][ri][fld]=val;autoSaveManual();}
function addRow(id){S.manual[id].push(erow(MDEFS.find(x=>x.id===id)));render();}
function delRow(id,ri){
  if(S.manual[id].length<=1){S.manual[id]=[erow(MDEFS.find(x=>x.id===id))];render();return;}
  S.manual[id].splice(ri,1);autoSaveManual();render();
}
function toggleExcl(idx){
  const k=wkey(_ws[idx]);
  if(S.excluded.has(k))S.excluded.delete(k);else S.excluded.add(k);
  autoSaveManual();render();
}

// ── Excel Export ─────────────────────────────────
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const ws=getAllWinners();
  const h1=['장학명','혜택','반','번호/학번','이름','계열','환산/향상','기존장학','중복여부','제외여부'];
  const rows=[h1];
  ws.forEach(w=>{
    const ex=S.excluded.has(wkey(w));
    rows.push([w.lbl,w.혜택,w.반,w.번호,w.이름,w.계열,w.val,S.exMap[String(w.번호)]||w.기존장학||'',w.dup?.length?'중복:'+w.dup.join(', '):'',ex?'제외(중복)':'']);
  });
  const s1=XLSX.utils.aoa_to_sheet(rows);
  s1['!cols']=[{wch:22},{wch:14},{wch:5},{wch:8},{wch:10},{wch:5},{wch:10},{wch:18},{wch:22},{wch:10}];
  XLSX.utils.book_append_sheet(wb,s1,'장학생명단');
  const stats=calcClassStats();
  if(stats.length){
    const h2=['반','인원','환산표점 평균','국어 표준 평균','수학 표준 평균','탐구 합산 평균'];
    const rows2=[h2];
    stats.forEach(s=>rows2.push([s.반+'반',s.인원,+s.환산.toFixed(1),+s.국어.toFixed(1),+s.수학.toFixed(1),+(s.탐1+s.탐2).toFixed(1)]));
    rows2.push(['전체',S.curStudents?.length||0,+overallAvg().toFixed(1),'','','']);
    const s2=XLSX.utils.aoa_to_sheet(rows2);
    XLSX.utils.book_append_sheet(wb,s2,'반별평균');
  }
  XLSX.writeFile(wb,`QUETTA_장학_${S.curYear}_${S.curMonth.padStart(2,'0')}.xlsx`);
}

  const mk=mkey();
  MDEFS.forEach(d=>{S.manual[d.id]=[erow(d)];});

      eh:['총합 향상','이번달 합','이전달 합'],ef:s=>[`<span class="iv">+${s.향상}</span>`,s.백분위합,s.이전합]}]
    .forEach(({key,lbl,bc,desc,eh,ef})=>{
      const s=r?.[key];
      h+=`<div class="card"><div class="ch"><span class="bx ${bc}">${lbl}</span><span class="cs">${desc}</span></div>`;
      h+=s?`<div class="tw"><table class="t"><thead><tr><th>반</th><th>번호</th><th>이름</th><th>계열</th>${eh.map(e=>`<th>${e}</th>`).join('')}<th>수학표준</th><th>국어표준</th><th>탐구합산</th>${ec}</tr></thead><tbody>
        <tr><td>${s.반}반</td><td class="nn">${s.번호}</td><td class="nm">${s.이름}</td><td>${s.계열}</td>${ef(s).map(v=>`<td class="nn">${v}</td>`).join('')}<td>${s.수학표준}</td><td>${s.국어표준}</td><td>${s.탐1표준+s.탐2표준}</td>${ev(s)}</tr>
      </tbody></table></div>`:`<div class="empty">대상자 없음</div>`;
      h+=`</div>`;
    });
  }
  return h;
}

// ── Page: 수기 입력 ─────────────────────────────────
function pgManual(){
  let h=`<div class="ph"><h2>수기 입력</h2><p>자동 산출 외 장학생 직접 입력 · Firestore 자동저장</p></div>`;
  MDEFS.forEach(d=>{
    const rows=S.manual[d.id]||[];
    const ws2={반:'50px',학번:'70px',이름:'80px',환산점수:'80px',비고:'1fr'};
    h+=`<div class="mg"><div class="mgh"><span class="bx ${d.bc}">${d.혜택}</span><span class="mgt">${d.lbl}</span></div><div class="mgb">`;
    h+=`<div class="mgr">${d.cols.map(c=>`<div style="font-size:10px;color:var(--mu);text-align:center;${ws2[c]==='1fr'?'flex:1;min-width:60px;':`width:${ws2[c]};`}">${c}</div>`).join('')}<div style="width:22px"></div></div>`;
    rows.forEach((row,ri)=>{
      h+=`<div class="mgr">`;
      d.cols.forEach(c=>{
        const st=ws2[c]==='1fr'?'flex:1;min-width:60px':`width:${ws2[c]}`;
        h+=`<input class="fi" style="${st}" type="text" value="${(row[c]||'').replace(/"/g,'&quot;')}" placeholder="${c}" oninput="upd('${d.id}',${ri},'${c}',this.value)">`;
      });
      h+=`<button class="rdel" onclick="delRow('${d.id}',${ri})">✕</button></div>`;
    });
    if(d.multi)h+=`<button class="addbtn" onclick="addRow('${d.id}')">+ 행 추가</button>`;
    h+=`</div></div>`;
  });
  return h;
}

// ── Page: 최종 명단 ─────────────────────────────────

  _ws=getAllWinners();

  h+=`<div class="btn-row">
    <button class="btn btn-g" onclick="exportExcel()">⬇ 엑셀 다운로드</button>

  </div>`;

  h+=`<div class="card"><div class="tw"><table class="t"><thead><tr>
    <th>제외</th><th>장학명</th><th>혜택</th><th>반</th><th>번호/학번</th><th>이름</th><th>계열</th><th>환산/향상</th><th>기존장학</th><th>중복여부</th>
  </tr></thead><tbody>`;
  _ws.forEach((w,i)=>{
    const k=wkey(w);const ex=S.excluded.has(k);
    const dup=w.dup?.length?`<span class="dup">중복</span>`:'';
    const dupFull=w.dup?.length?w.dup.join(', '):'–';
    const _exg=S.exMap[String(w.번호)]||w.기존장학||'';const exg=_exg?`<span class="bx bq">${_exg}</span>`:'–';
    h+=`<tr class="${ex?'ex':''}">
      <td><input type="checkbox" ${ex?'checked':''} onchange="toggleExcl(${i})"></td>
      <td><span class="bx ${w.bc}">${w.lbl}</span></td>
      <td style="font-size:11px;color:var(--mu)">${w.혜택}</td>
      <td>${w.반?w.반+'반':''}</td>
      <td class="nn">${w.번호||'–'}</td>
      <td class="nm">${w.이름}${dup}</td>
      <td>${w.계열||'–'}</td>
      <td class="nn">${w.val}</td>
      <td>${exg}</td>
      <td style="font-size:11px;color:${w.dup?.length?'var(--red)':'var(--mu)'}">${dupFull}</td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}

// ── Chart builder ─────────────────────────────────
function buildLineChart(months, acc){
  const W=560,H=200,PL=48,PR=20,PT=16,PB=36;
  const iW=W-PL-PR,iH=H-PT-PB;
  const n=months.length;
  // 전체 평균
  const ovAvgs=months.map(k=>+(acc[k].overallAvg||0));
  // 반 목록 수집
  const banSet=new Set();
  months.forEach(k=>(acc[k].classStats||[]).forEach(s=>banSet.add(s.반)));
  const bans=[...banSet].sort((a,b)=>a-b);
  // 반별 평균 데이터
  const banData={};
  bans.forEach(b=>{banData[b]=months.map(k=>{const s=(acc[k].classStats||[]).find(x=>x.반===b);return s?+s.환산:null;});});
  // 전체 min/max
  let allVals=[...ovAvgs];
  bans.forEach(b=>allVals.push(...banData[b].filter(v=>v!==null)));
  const mn=Math.min(...allVals),mx=Math.max(...allVals);
  const pad=(mx-mn)*0.1||5;
  const lo=mn-pad,hi=mx+pad;
  const xp=i=>PL+i*(iW/(n-1));
  const yp=v=>PT+iH-(((v-lo)/(hi-lo))*iH);
  // 색상 팔레트
  const COLORS=['#5b9bd5','#5da87a','#d4a039','#d97c6a','#9b7dd4','#4ec9c9','#e07b9b','#a0c45a'];
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;display:block;margin:0 auto;overflow:visible">`;
  // 배경 그리드
  const ticks=4;
  for(let i=0;i<=ticks;i++){
    const y=PT+iH*(i/ticks);
    const v=(hi-lo)*(1-i/ticks)+lo;
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(244,241,235,.07)" stroke-width="1"/>`;
    svg+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="rgba(244,241,235,.4)">${v.toFixed(0)}</text>`;
  }
  // X축 라벨
  months.forEach((k,i)=>{
    const lbl=(acc[k].label||fmtKey(k)).replace(/\d{4}년 /,'');
    svg+=`<text x="${xp(i)}" y="${H-4}" text-anchor="middle" font-size="9" fill="rgba(244,241,235,.5)">${lbl}</text>`;
    svg+=`<line x1="${xp(i)}" y1="${PT}" x2="${xp(i)}" y2="${H-PB}" stroke="rgba(244,241,235,.04)" stroke-width="1"/>`;
  });
  // 반별 선
  bans.forEach((b,ci)=>{
    const pts=banData[b];
    const col=COLORS[ci%COLORS.length];
    let path='';
    pts.forEach((v,i)=>{if(v===null)return;if(!path)path=`M${xp(i)},${yp(v)}`;else path+=`L${xp(i)},${yp(v)}`;});
    if(path)svg+=`<path d="${path}" fill="none" stroke="${col}" stroke-width="1.5" stroke-dasharray="4 2" opacity=".6"/>`;
    pts.forEach((v,i)=>{if(v===null)return;svg+=`<circle cx="${xp(i)}" cy="${yp(v)}" r="2.5" fill="${col}" opacity=".7"><title>${acc[months[i]].label||months[i]} ${b}반: ${v.toFixed(1)}</title></circle>`;});
  });
  // 전체 평균 선 (굵게)
  let oPath='';
  ovAvgs.forEach((v,i)=>{oPath+=i===0?`M${xp(i)},${yp(v)}`:`L${xp(i)},${yp(v)}`;});
  svg+=`<path d="${oPath}" fill="none" stroke="#c9a84c" stroke-width="2.5"/>`;
  ovAvgs.forEach((v,i)=>{
    svg+=`<circle cx="${xp(i)}" cy="${yp(v)}" r="4" fill="#c9a84c"><title>${acc[months[i]].label||months[i]} 전체: ${v.toFixed(1)}</title></circle>`;
    svg+=`<text x="${xp(i)}" y="${yp(v)-8}" text-anchor="middle" font-size="9" fill="#e8c97a" font-weight="700">${v.toFixed(1)}</text>`;
  });
  svg+=`</svg>`;
  // 범례
  let legend=`<div style="display:flex;flex-wrap:wrap;gap:8px 14px;padding:8px 12px 12px;font-size:11px">`;
  legend+=`<span style="color:#c9a84c;font-weight:700">● 전체평균</span>`;
  bans.forEach((b,ci)=>{legend+=`<span style="color:${COLORS[ci%COLORS.length]};opacity:.8">- ${b}반</span>`;});
  legend+=`</div>`;
  return `<div class="card" style="margin-bottom:12px"><div style="padding:12px 8px 0">${svg}</div>${legend}</div>`;
}

// ── Page: 통계 & 누적 ─────────────────────────────────
function pgStats(){
  let h=`<div class="ph"><h2>통계 & 누적</h2><p>반별 환산표점 평균 · 월별 이력 · 학생별 수상 통계</p></div>`;
  if(S.curStudents){
    h+=`<div class="sec-title">📊 ${S.curYear}년 ${S.curMonth}월 반별 환산표점 평균</div><div class="stats-grid">`;
    calcClassStats().forEach(s=>{
      h+=`<div class="sc"><div class="ban">${s.반}반 <span style="font-size:11px;color:var(--mu);font-weight:400">(${s.인원}명)</span></div>
        <div class="row"><span class="k">환산표점 평균</span><span class="v" style="color:var(--gold2)">${s.환산.toFixed(1)}</span></div>
        <div class="row"><span class="k">국어 표준</span><span class="v">${s.국어.toFixed(1)}</span></div>
        <div class="row"><span class="k">수학 표준</span><span class="v">${s.수학.toFixed(1)}</span></div>
        <div class="row"><span class="k">탐구 표준 합</span><span class="v">${(s.탐1+s.탐2).toFixed(1)}</span></div>
      </div>`;
    });
    h+=`<div class="sc" style="border-color:rgba(201,168,76,.4)"><div class="ban" style="color:var(--gold2)">전 체 <span style="font-size:11px;font-weight:400;color:var(--mu)">(${S.curStudents.length}명)</span></div>
      <div class="row"><span class="k">환산표점 평균</span><span class="v" style="color:var(--gold2)">${overallAvg().toFixed(1)}</span></div></div>`;
    h+=`</div>`;
  } else {
    h+=`<div class="notice">이번달 성적 파일을 업로드하면 반별 평균이 표시됩니다.</div>`;
  }
  const months=Object.keys(S.accumulated).sort();
  if(months.length){
    h+=`<div class="sec-title">📅 월별 장학 누적 현황</div>`;
    h+=`<div class="card"><div class="tw"><table class="t"><thead><tr><th>월</th><th>총 수여</th><th>최종(제외 후)</th><th>환산표점 전체 평균</th><th>저장일</th></tr></thead><tbody>`;
    months.slice().reverse().forEach(k=>{
      const d=S.accumulated[k];
      const act=(d.winners||[]).filter(w=>!w.excluded).length;
      h+=`<tr><td style="color:var(--gold2);font-weight:500">${d.label||fmtKey(k)}</td><td>${(d.winners||[]).length}건</td><td>${act}건</td><td>${d.overallAvg?d.overallAvg.toFixed(1):'–'}</td><td style="font-size:11px;color:var(--mu)">${d.savedAt?new Date(d.savedAt).toLocaleDateString('ko-KR'):'–'}</td></tr>`;
    });
    h+=`</tbody></table></div></div>`;

    // ── 그래프: 월별 환산표점 평균 추이
    const chartMonths=months.filter(k=>S.accumulated[k].overallAvg);
    if(chartMonths.length>=2){
      h+=`<div class="sec-title">📈 월별 환산표점 평균 추이</div>`;
      h+=buildLineChart(chartMonths,S.accumulated);
    }
    h+=`<div class="sec-title">🏆 학생별 수상 이력</div>`;
    const sm={};
    months.forEach(k=>{
      (S.accumulated[k].winners||[]).filter(w=>!w.excluded).forEach(w=>{
        if(!sm[w.이름])sm[w.이름]={이름:w.이름,반:w.반,cnt:0,months:[],detail:[]};
        sm[w.이름].cnt++;
        const ml=S.accumulated[k].label||k;
        if(!sm[w.이름].months.includes(ml))sm[w.이름].months.push(ml);
        sm[w.이름].detail.push(`${ml}:${w.lbl}`);
      });
    });
    const stus=Object.values(sm).sort((a,b)=>b.cnt-a.cnt);
    h+=`<div class="card"><div class="tw"><table class="t"><thead><tr><th>이름</th><th>반</th><th>수상횟수</th><th>수상월</th><th>상세이력</th></tr></thead><tbody>`;
    stus.forEach(s=>{
      h+=`<tr><td class="nm">${s.이름}</td><td>${s.반}반</td><td style="color:var(--gold2);font-weight:700">${s.cnt}회</td><td style="font-size:11px">${s.months.join(', ')}</td><td style="font-size:11px;color:var(--mu)">${s.detail.join(' / ')}</td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  } else {
    h+=`<div class="notice" style="margin-top:12px">최종 명단 탭에서 "이번달 저장"을 하면 누적 데이터가 쌓입니다.</div>`;
  }
  return h;
}

// ── Slot binding ─────────────────────────────────
function ubH(id,lbl,sub){
  const file=id==='cur'?S.curFile:id==='prev'?S.prevFile:S.exFile;
  return`<div class="ub${file?' done':''}" id="ub-${id}"><div class="lbl">${lbl}</div><div class="sub">${sub}</div>${file?`<div class="fn">✓ ${file}</div><div class="rst" onclick="event.stopPropagation();resetF('${id}')">변경</div>`:`<div class="sub" style="margin-top:5px">클릭 또는 드래그</div>`}</div>`;
}
function resetF(id){
  if(id==='cur'){S.curStudents=null;S.curFile=null;S.results=null;}
  else if(id==='prev'){S.prevStudents=null;S.prevFile=null;if(S.curStudents)S.results=calcResults();}
  else{S.exMap={};S.exFile=null;}
  S.dbg='';render();
}
function handleFile(id,file){
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const buf=new Uint8Array(ev.target.result);
      if(id==='ex'){S.exMap=parseExisting(buf);S.exFile=file.name;S.err=null;render();return;}
      const st=parseScores(buf);
      if(!st.length)throw new Error('학생 데이터를 찾을 수 없습니다.');
      if(id==='cur'){S.curStudents=st;S.curFile=file.name;}
      else{S.prevStudents=st;S.prevFile=file.name;}
      S.err=null;
      if(S.curStudents)S.results=calcResults();
      render();
    }catch(e){S.err=e.message;render();}
  };
  rd.readAsArrayBuffer(file);
}
function bindSlots(){
  ['cur','prev','ex'].forEach(id=>{
    const el=document.getElementById(`ub-${id}`);if(!el)return;
    el.onclick=()=>document.getElementById(`fi-${id}`).click();
    el.ondragover=e=>{e.preventDefault();el.classList.add('drag')};
    el.ondragleave=()=>el.classList.remove('drag');
    el.ondrop=e=>{e.preventDefault();el.classList.remove('drag');if(e.dataTransfer.files[0])handleFile(id,e.dataTransfer.files[0]);};
  });
}
['cur','prev','ex'].forEach(id=>{
  const el=document.getElementById(`fi-${id}`);
  if(el)el.onchange=()=>{if(el.files[0]){handleFile(id,el.files[0]);el.value='';}};
});
</script>
